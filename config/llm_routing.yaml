# Role-to-model routing for the default OpenAI-compatible gateway.
# Provider names must match surveyforge.llm.providers.ProviderName.
# Override MODELS_BASE_URL and MODELS_API_KEY to use another compatible
# gateway, then update model aliases here if your provider uses different names.
#
# `supports_fc` is optional. Omit it to inherit the provider-level default.
# Set it explicitly only when a binding's model differs from the provider
# default function-calling capability.
# `notes` fields are documentation-only; load_routing_yaml ignores unknown
# per-binding keys.

planner:
  provider: glm
  model: glm-5.1
  temperature: 0.0
  notes: "Long-horizon planning; 128K context."

researcher_wide:
  provider: deepseek
  model: deepseek-chat
  temperature: 0.0
  notes: "32K limit; snippet-level triage; bounded ReAct turns."

researcher_deep:
  provider: minimax
  model: minimax
  temperature: 0.0
  notes: "MiniMax-M2.7 alias; 192K; abstract/evidence extraction. Prefer function-calling."

synthesizer:
  provider: glm
  model: glm-5.1
  temperature: 0.0
  notes: "Cross-evidence merge and taxonomy."

writer:
  provider: minimax
  model: minimax
  temperature: 0.3
  notes: "Long-form drafting; slight creativity allowed."

critic_section:
  provider: glm
  model: glm-5.1
  temperature: 0.0

critic_final:
  provider: minimax
  model: minimax
  temperature: 0.0
  notes: "192K full-survey critique."

judge_default:
  provider: qwen
  model: qwen
  temperature: 0.0
  notes: "Qwen3.5-27B alias; 256K; function-calling disabled on the default gateway."

judge_final:
  provider: glm
  model: glm-5.1
  temperature: 0.0
  notes: "High-stakes gatekeeper before publication."

lite_worker:
  provider: qwen
  model: qwen3coder
  temperature: 0.0
  supports_fc: true
  notes: "Qwen3Coder; function-calling enabled for high-frequency utility tasks."
