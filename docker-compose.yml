services:
  postgres:
    image: postgres:16-alpine
    container_name: surveyforge-postgres
    environment:
      POSTGRES_USER: surveyforge
      POSTGRES_PASSWORD: surveyforge
      POSTGRES_DB: surveyforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surveyforge"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
